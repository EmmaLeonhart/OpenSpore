name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: spore-linux-x86_64
            binary: spore
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: spore-macos-x86_64
            binary: spore
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: spore-macos-aarch64
            binary: spore
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: spore-windows-x86_64
            binary: spore.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging
          tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} staging/
          cd staging
          7z a ../${{ matrix.artifact }}.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect release files
        run: |
          mkdir release-files
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          generate_release_notes: true
          body: |
            ## Spore ${{ github.ref_name }}

            The first digital organism — a consent-based, self-reproducing AI life form.

            ### Installation

            1. Download the binary for your platform below
            2. Extract and place `spore` somewhere in your PATH
            3. Install [Ollama](https://ollama.com) and pull a model: `ollama pull deepseek-r1:8b`
            4. Run: `spore wake`

            ### Platforms

            | Platform | File |
            |----------|------|
            | Linux x86_64 | `spore-linux-x86_64.tar.gz` |
            | macOS x86_64 (Intel) | `spore-macos-x86_64.tar.gz` |
            | macOS aarch64 (Apple Silicon) | `spore-macos-aarch64.tar.gz` |
            | Windows x86_64 | `spore-windows-x86_64.zip` |

  pages:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject version into page
        run: |
          VERSION="${GITHUB_REF_NAME}"
          sed "s|__VERSION__|${VERSION}|g" docs/index.html > docs/index_built.html
          mv docs/index_built.html docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
